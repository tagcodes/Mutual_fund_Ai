name: Daily Mutual Fund Data Sync

on:
  schedule:
    # 9:15 AM IST is 3:45 AM UTC
    - cron: '45 3 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: |
          python src/phase_5_scheduler_scraper/scraper.py

      - name: Run Embedder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: |
          python src/phase_2_embedding/embedder.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/phase_1_ingestion/data/*.md
          git commit -m "Auto-update: Latest scheme data [$(date)]" || echo "No changes to commit"
          git push
